<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reading exercise - reader (furigana on)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --surface-2: #ffffff;
    --border: rgba(0,0,0,0.10);
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #8b8a86;
    --fill-accent: #378ADD;
    --fill-primary: #1a1a18;
    --jp-sans: 'Noto Sans JP', sans-serif;
    --ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body { background: #edece7; font-family: var(--ui); padding: 32px 16px; margin: 0; color: var(--text-primary); }
  ruby { ruby-position: over; ruby-align: center; }
  rt { font-family: var(--jp-sans); font-weight: 500; font-size: .5em; color: var(--rt-color, #185FA5); line-height: 1; letter-spacing: .02em; }
  i.ti { line-height: 1; }
</style>
</head>
<body>
<!-- Reading exercise: the read screen itself ("Direction 1a - Reader"), furigana on (default). Speaker name sits in a fixed left margin column, not an inline "Name: line" prefix. Only vocab-linked tokens are underlined/tappable (light blue) - grammar glue (は/に/か/です/この) and punctuation are plain. See reading-exercise.md, decision log D41. Source: Claude Design handoff "Reading Exercise Mockups". -->
<div style="background:#dededa;border-radius:40px;padding:10px;box-shadow:0 6px 22px rgba(0,0,0,.11);max-width:320px;margin:0 auto;">
  <div style="width:300px;height:640px;background:var(--surface-2);border-radius:31px;overflow:hidden;display:flex;flex-direction:column;position:relative;">
    <div style="height:36px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 22px;font:600 13px var(--ui);"><span>9:41</span><span style="display:flex;align-items:center;gap:6px;font-size:15px;"><i class="ti ti-antenna-bars-4"></i><i class="ti ti-wifi"></i><i class="ti ti-battery-3"></i></span></div>
    <div style="height:50px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:0.5px solid var(--border);">
      <button style="width:34px;height:34px;border:none;background:transparent;border-radius:8px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;"><i class="ti ti-x"></i></button>
      <span style="font:500 13px var(--ui);color:var(--text-secondary);">Reading</span>
      <div style="display:flex;align-items:center;gap:8px;"><span style="font:600 12px var(--jp-sans);color:var(--text-secondary);">ふりがな</span><div style="width:38px;height:22px;border-radius:11px;background:var(--fill-accent);position:relative;flex:0 0 auto;"><div style="position:absolute;top:2px;left:18px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);"></div></div></div>
    </div>
    <div style="flex:1;overflow:hidden;padding:14px 18px 4px;background:#fcfbf8;">
      <div style="display:flex;gap:12px;padding:6px 0;"><div style="flex:0 0 34px;text-align:right;font:500 12px var(--jp-sans);color:var(--text-muted);padding-top:25px;">鈴木</div><div style="flex:1;font:500 21px/2.15 var(--jp-sans);color:#26251f;--rt-color:#4a7fbe;"><span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>田中<rt>たなか</rt></ruby></span>は<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>学校<rt>がっこう</rt></ruby></span>に<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>行<rt>い</rt></ruby>きます</span>か。</div></div>
      <div style="display:flex;gap:12px;padding:6px 0;"><div style="flex:0 0 34px;text-align:right;font:500 12px var(--jp-sans);color:var(--text-muted);padding-top:25px;">田中</div><div style="flex:1;font:500 21px/2.15 var(--jp-sans);color:#26251f;--rt-color:#4a7fbe;">はい、<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>学校<rt>がっこう</rt></ruby></span>に<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>行<rt>い</rt></ruby>きます</span>。</div></div>
      <div style="display:flex;gap:12px;padding:6px 0;"><div style="flex:0 0 34px;text-align:right;font:500 12px var(--jp-sans);color:var(--text-muted);padding-top:25px;">鈴木</div><div style="flex:1;font:500 21px/2.15 var(--jp-sans);color:#26251f;--rt-color:#4a7fbe;"><span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>田中<rt>たなか</rt></ruby></span>は<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;">すし</span>を<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>食<rt>た</rt></ruby>べます</span>か。</div></div>
      <div style="display:flex;gap:12px;padding:6px 0;"><div style="flex:0 0 34px;text-align:right;font:500 12px var(--jp-sans);color:var(--text-muted);padding-top:25px;">田中</div><div style="flex:1;font:500 21px/2.15 var(--jp-sans);color:#26251f;--rt-color:#4a7fbe;">いいえ、<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;">すし</span>を<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>食<rt>た</rt></ruby>べません</span>。</div></div>
      <div style="display:flex;gap:12px;padding:6px 0;"><div style="flex:0 0 34px;text-align:right;font:500 12px var(--jp-sans);color:var(--text-muted);padding-top:25px;">鈴木</div><div style="flex:1;font:500 21px/2.15 var(--jp-sans);color:#26251f;--rt-color:#4a7fbe;">この<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>本<rt>ほん</rt></ruby></span>は<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>面白<rt>おもしろ</rt></ruby>い</span>ですか。</div></div>
      <div style="display:flex;gap:12px;padding:6px 0;"><div style="flex:0 0 34px;text-align:right;font:500 12px var(--jp-sans);color:var(--text-muted);padding-top:25px;">田中</div><div style="flex:1;font:500 21px/2.15 var(--jp-sans);color:#26251f;--rt-color:#4a7fbe;">はい、<span style="border-bottom:1.5px solid #b9d4ef;cursor:pointer;"><ruby>面白<rt>おもしろ</rt></ruby>い</span>です。</div></div>
    </div>
    <div style="flex:0 0 auto;padding:12px 18px 18px;background:#fcfbf8;">
      <div style="text-align:center;font:400 11px var(--ui);color:var(--text-muted);margin:0 0 10px;">Tap any word to look it up</div>
      <button style="width:100%;height:46px;border:none;border-radius:23px;background:var(--fill-primary);color:#fff;font:600 15px var(--ui);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;">Next <i class="ti ti-arrow-right" style="font-size:18px;"></i></button>
    </div>
  </div>
</div>
</body></html>
