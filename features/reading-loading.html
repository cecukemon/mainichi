<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reading exercise - loading</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
  :root {
    --surface-1: #edece7;
    --surface-2: #ffffff;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #8b8a86;
    --fill-accent: #378ADD;
    --ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body { background: var(--surface-1); font-family: var(--ui); padding: 32px 16px; margin: 0; color: var(--text-primary); }
  i.ti { line-height: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: .9; } }
</style>
</head>
<body>
<!-- Reading exercise: loading state while a conversation generates (every "Next" pays this again — continuous feed, no fixed session length). See reading-exercise.md. Source: Claude Design handoff "Reading Exercise Mockups" (shared states). -->
<div style="background:#dededa;border-radius:40px;padding:10px;box-shadow:0 6px 22px rgba(0,0,0,.11);max-width:320px;margin:0 auto;">
  <div style="width:300px;height:640px;background:var(--surface-2);border-radius:31px;overflow:hidden;display:flex;flex-direction:column;position:relative;">
    <div style="height:36px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 22px;font:600 13px var(--ui);"><span>9:41</span><span style="display:flex;align-items:center;gap:6px;font-size:15px;"><i class="ti ti-antenna-bars-4"></i><i class="ti ti-wifi"></i><i class="ti ti-battery-3"></i></span></div>
    <div style="height:50px;display:flex;align-items:center;padding:0 14px;flex:0 0 auto;"><button style="width:34px;height:34px;border:none;background:transparent;border-radius:8px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;"><i class="ti ti-x"></i></button></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 34px;">
      <div style="width:44px;height:44px;border-radius:50%;border:3px solid var(--surface-1);border-top-color:var(--fill-accent);animation:spin .8s linear infinite;"></div>
      <div style="font:600 16px var(--ui);color:var(--text-primary);margin:24px 0 0;">Generating a conversation…</div>
      <div style="font:400 13px var(--ui);color:var(--text-muted);margin:7px 0 0;text-align:center;">Composing from the words you've learned</div>
      <div style="width:100%;margin-top:36px;display:flex;flex-direction:column;gap:13px;">
        <div style="height:12px;border-radius:6px;background:var(--surface-1);width:82%;animation:pulse 1.4s ease-in-out infinite;"></div>
        <div style="height:12px;border-radius:6px;background:var(--surface-1);width:96%;animation:pulse 1.4s ease-in-out .2s infinite;"></div>
        <div style="height:12px;border-radius:6px;background:var(--surface-1);width:64%;animation:pulse 1.4s ease-in-out .4s infinite;"></div>
      </div>
    </div>
  </div>
</div>
</body></html>
