<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reading exercise - error</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
  :root {
    --surface-2: #ffffff;
    --border-strong: rgba(0,0,0,0.18);
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-warning: #854F0B;
    --bg-warning: #FAEEDA;
    --fill-primary: #1a1a18;
    --ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body { background: #edece7; font-family: var(--ui); padding: 32px 16px; margin: 0; color: var(--text-primary); }
  i.ti { line-height: 1; }
</style>
</head>
<body>
<!-- Reading exercise: error state on a refused/scope-invalid generation. Explicit retry, no silent infinite-retry loop (decision log D42). See reading-exercise.md. Source: Claude Design handoff "Reading Exercise Mockups" (shared states). -->
<div style="background:#dededa;border-radius:40px;padding:10px;box-shadow:0 6px 22px rgba(0,0,0,.11);max-width:320px;margin:0 auto;">
  <div style="width:300px;height:640px;background:var(--surface-2);border-radius:31px;overflow:hidden;display:flex;flex-direction:column;position:relative;">
    <div style="height:36px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 22px;font:600 13px var(--ui);"><span>9:41</span><span style="display:flex;align-items:center;gap:6px;font-size:15px;"><i class="ti ti-antenna-bars-4"></i><i class="ti ti-wifi"></i><i class="ti ti-battery-3"></i></span></div>
    <div style="height:50px;display:flex;align-items:center;padding:0 14px;flex:0 0 auto;"><button style="width:34px;height:34px;border:none;background:transparent;border-radius:8px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;"><i class="ti ti-x"></i></button></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;text-align:center;">
      <div style="width:60px;height:60px;border-radius:50%;background:var(--bg-warning);display:flex;align-items:center;justify-content:center;"><i class="ti ti-alert-triangle" style="font-size:28px;color:var(--text-warning);"></i></div>
      <div style="font:600 17px var(--ui);color:var(--text-primary);margin:20px 0 0;">Couldn't generate that one</div>
      <div style="font:400 13px/1.55 var(--ui);color:var(--text-secondary);margin:9px 0 0;">The generator didn't return a conversation in scope. You can try again, or head back.</div>
    </div>
    <div style="flex:0 0 auto;padding:0 22px 24px;display:flex;flex-direction:column;gap:10px;">
      <button style="width:100%;height:46px;border:none;border-radius:12px;background:var(--fill-primary);color:#fff;font:600 15px var(--ui);cursor:pointer;">Try again</button>
      <button style="width:100%;height:46px;border:0.5px solid var(--border-strong);border-radius:12px;background:var(--surface-2);color:var(--text-secondary);font:600 15px var(--ui);cursor:pointer;">Exit</button>
    </div>
  </div>
</div>
</body></html>
