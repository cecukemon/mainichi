<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capture loop - review queue picture word</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
  :root {
    --surface-0: #f4f3f0;
    --surface-1: #edece7;
    --surface-2: #ffffff;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --border-accent: #378ADD;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #8b8a86;
    --text-accent: #185FA5;
    --text-success: #3B6D11;
    --text-warning: #854F0B;
    --text-pro: #534AB7;
    --bg-accent: #E6F1FB;
    --bg-success: #EAF3DE;
    --bg-warning: #FAEEDA;
    --bg-pro: #EEEDFE;
    --fill-accent: #378ADD;
    --fill-primary: #1a1a18;
    --on-primary: #ffffff;
    --on-accent: #ffffff;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--surface-0);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 32px 16px;
    margin: 0;
    color: var(--text-primary);
  }
  h2 { font-size: 18px; font-weight: 500; margin: 0; }
  p { margin: 0; }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 14px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface-2);
    cursor: pointer;
  }
  button:hover { background: var(--surface-1); }
  input, select {
    font-family: inherit;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface-2);
    color: var(--text-primary);
    height: 36px;
  }
</style>
</head>
<body>
<!-- Capture loop: review-queue picture-derived word card. Field order matches review-queue-vocab-item-kanji-candidates.html (kanji, kana, meaning, role) with the drawing shown up top and both kanji and meaning offered as candidate chips. A margin-note gloss, if present, is folded into the meaning candidate row rather than getting its own affordance (unlike the plain vocab card). See capture-loop.md sec 2/3. Renders on Claude Design System tokens and Tabler outline icons; will not render standalone without those loaded. -->
<div style="background: var(--surface-1); border-radius: 12px; padding: 12px; max-width: 340px; margin: 0 auto;">
  <div style="background: var(--surface-2); border-radius: 28px; border: 0.5px solid var(--border); overflow: hidden;">

    <div style="display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 6px;">
      <i class="ti ti-chevron-left" style="font-size: 18px; color: var(--text-secondary);" aria-hidden="true"></i>
      <span style="font-size: 13px; color: var(--text-secondary);">Item 6 of 8</span>
      <span style="font-size: 12px; color: var(--text-accent);">Skipped (1)</span>
    </div>

    <div style="padding: 4px 16px 4px;">
      <div style="height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 18px;">
        <div style="height: 100%; width: 68%; background: var(--fill-accent);"></div>
      </div>
    </div>

    <div style="padding: 0 16px 16px;">

      <span style="display: inline-block; font-size: 12px; color: var(--text-warning); background: var(--bg-warning); padding: 3px 10px; border-radius: var(--radius); margin-bottom: 14px;">Picture-derived — meaning inferred</span>

      <div style="width: 100%; height: 120px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface-1); display: flex; align-items: center; justify-content: center; margin-bottom: 6px;">
        <i class="ti ti-pencil" style="font-size: 30px; color: var(--text-muted);" aria-hidden="true"></i>
      </div>
      <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 16px; text-align: center;">Drawing from the worksheet — no text gloss</p>

      <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 6px;">Kanji</p>
      <div style="display: flex; align-items: center; gap: 10px; background: var(--surface-1); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px;">
        <div style="width: 40px; height: 40px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--surface-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <i class="ti ti-photo" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>
        </div>
        <div>
          <p style="font-size: 11px; color: var(--text-muted); margin: 0;">Read from worksheet</p>
          <p style="font-size: 20px; margin: 2px 0 0;">走る</p>
        </div>
      </div>
      <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;">
        <button style="font-size: 13px; padding: 6px 12px; background: var(--fill-accent); color: var(--on-accent); border: none;">走る</button>
        <button style="font-size: 13px; padding: 6px 12px;">趣る</button>
        <button style="font-size: 13px; padding: 6px 12px; display: flex; align-items: center; gap: 4px;">
          <i class="ti ti-ban" style="font-size: 14px;" aria-hidden="true"></i>
          No kanji
        </button>
      </div>

      <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 4px;">Kana reading</p>
      <input type="text" value="はしる" style="width: 100%; margin-bottom: 16px;" />

      <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 6px;">Meaning</p>
      <input type="text" value="to jog" style="width: 100%; margin-bottom: 8px;" />
      <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;">
        <button style="font-size: 13px; padding: 6px 12px; background: var(--fill-accent); color: var(--on-accent); border: none;">to jog</button>
        <button style="font-size: 13px; padding: 6px 12px;">to run</button>
        <button style="font-size: 13px; padding: 6px 12px;">to rush</button>
        <button style="font-size: 13px; padding: 6px 12px; display: flex; align-items: center; gap: 4px;">
          <i class="ti ti-note" style="font-size: 13px;" aria-hidden="true"></i>
          rennen
        </button>
      </div>

      <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 4px;">Role</p>
      <select style="width: 100%; margin-bottom: 20px;">
        <option>Verb</option>
        <option>Noun</option>
      </select>

      <div style="display: flex; gap: 8px;">
        <button style="flex: 1;">Skip</button>
        <button style="flex: 2; background: var(--fill-primary); color: var(--on-primary); border: none; display: flex; align-items: center; justify-content: center; gap: 6px;">
          <i class="ti ti-check" style="font-size: 16px;" aria-hidden="true"></i>
          Approve
        </button>
      </div>

    </div>
  </div>
</div>
</body></html>
