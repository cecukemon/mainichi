<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capture loop - triage screen</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
  :root {
    --surface-0: #f4f3f0;
    --surface-1: #edece7;
    --surface-2: #ffffff;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --border-accent: #378ADD;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #8b8a86;
    --text-accent: #185FA5;
    --text-success: #3B6D11;
    --text-warning: #854F0B;
    --text-pro: #534AB7;
    --bg-accent: #E6F1FB;
    --bg-success: #EAF3DE;
    --bg-warning: #FAEEDA;
    --bg-pro: #EEEDFE;
    --fill-accent: #378ADD;
    --fill-primary: #1a1a18;
    --on-primary: #ffffff;
    --on-accent: #ffffff;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--surface-0);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 32px 16px;
    margin: 0;
    color: var(--text-primary);
  }
  h2 { font-size: 18px; font-weight: 500; margin: 0; }
  p { margin: 0; }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 14px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface-2);
    cursor: pointer;
  }
  button:hover { background: var(--surface-1); }
  input, select {
    font-family: inherit;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface-2);
    color: var(--text-primary);
    height: 36px;
  }
</style>
</head>
<body>
<!-- Capture loop: triage screen. Renders on Claude Design System tokens (--surface-*, --text-*, --bg-*) and the Tabler outline icon font; will not render standalone without those loaded. See capture-loop.md. -->
<div style="background: var(--surface-1); border-radius: 12px; padding: 12px; max-width: 340px; margin: 0 auto;">
  <div style="background: var(--surface-2); border-radius: 28px; border: 0.5px solid var(--border); overflow: hidden;">

    <div style="display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px;">
      <i class="ti ti-x" style="font-size: 18px; color: var(--text-secondary);" aria-hidden="true"></i>
      <span style="font-size: 13px; color: var(--text-secondary);">New import</span>
      <span style="width: 18px;"></span>
    </div>

    <div style="padding: 0 16px 16px;">

      <div style="border-radius: 12px; overflow: hidden; border: 0.5px solid var(--border); margin-bottom: 16px; height: 100px; background: var(--surface-1); display: flex; align-items: center; justify-content: center;">
        <i class="ti ti-file-text" style="font-size: 28px; color: var(--text-muted);" aria-hidden="true"></i>
      </div>

      <h2 style="margin: 0 0 4px;">Worksheet extracted</h2>
      <p style="font-size: 13px; color: var(--text-secondary); margin: 0 0 16px; line-height: 1.5;">12 vocab, 3 templates, 2 picture words</p>

      <div style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-bottom: 20px;">
        <div style="background: var(--bg-success); border-radius: var(--radius); padding: 12px;">
          <p style="font-size: 12px; color: var(--text-success); margin: 0 0 4px;">High-confidence</p>
          <p style="font-size: 22px; font-weight: 500; color: var(--text-success); margin: 0;">9</p>
        </div>
        <div style="background: var(--bg-warning); border-radius: var(--radius); padding: 12px;">
          <p style="font-size: 12px; color: var(--text-warning); margin: 0 0 4px;">Needs review</p>
          <p style="font-size: 22px; font-weight: 500; color: var(--text-warning); margin: 0;">8</p>
        </div>
      </div>

      <div style="border-top: 0.5px solid var(--border); padding-top: 14px; margin-bottom: 16px;">
        <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 10px;">Needs review breakdown</p>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <div style="display: flex; align-items: center; justify-content: space-between; font-size: 13px;">
            <span style="display: flex; align-items: center; gap: 8px; color: var(--text-primary);"><i class="ti ti-language-hiragana" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>Vocabulary</span>
            <span style="color: var(--text-secondary);">3</span>
          </div>
          <div style="display: flex; align-items: center; justify-content: space-between; font-size: 13px;">
            <span style="display: flex; align-items: center; gap: 8px; color: var(--text-primary);"><i class="ti ti-photo" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>Picture words</span>
            <span style="color: var(--text-secondary);">2</span>
          </div>
          <div style="display: flex; align-items: center; justify-content: space-between; font-size: 13px;">
            <span style="display: flex; align-items: center; gap: 8px; color: var(--text-primary);"><i class="ti ti-align-left" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>Templates</span>
            <span style="color: var(--text-secondary);">2</span>
          </div>
          <div style="display: flex; align-items: center; justify-content: space-between; font-size: 13px;">
            <span style="display: flex; align-items: center; gap: 8px; color: var(--text-primary);"><i class="ti ti-git-merge" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>Possible merges</span>
            <span style="color: var(--text-secondary);">1</span>
          </div>
        </div>
      </div>

      <button style="width: 100%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px;">
        <i class="ti ti-check" style="font-size: 16px;" aria-hidden="true"></i>
        Approve all high-confidence (9)
      </button>
      <button style="width: 100%; background: var(--fill-primary); color: var(--on-primary); border: none; display: flex; align-items: center; justify-content: center; gap: 6px;">
        Review queue (8)
        <i class="ti ti-arrow-right" style="font-size: 16px;" aria-hidden="true"></i>
      </button>

    </div>
  </div>
</div>
</body></html>
