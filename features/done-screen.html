<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capture loop - done screen</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
  :root {
    --surface-0: #f4f3f0;
    --surface-1: #edece7;
    --surface-2: #ffffff;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --border-accent: #378ADD;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #8b8a86;
    --text-accent: #185FA5;
    --text-success: #3B6D11;
    --text-warning: #854F0B;
    --text-pro: #534AB7;
    --bg-accent: #E6F1FB;
    --bg-success: #EAF3DE;
    --bg-warning: #FAEEDA;
    --bg-pro: #EEEDFE;
    --fill-accent: #378ADD;
    --fill-primary: #1a1a18;
    --on-primary: #ffffff;
    --on-accent: #ffffff;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--surface-0);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 32px 16px;
    margin: 0;
    color: var(--text-primary);
  }
  h2 { font-size: 18px; font-weight: 500; margin: 0; }
  p { margin: 0; }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 14px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface-2);
    cursor: pointer;
  }
  button:hover { background: var(--surface-1); }
  input, select {
    font-family: inherit;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface-2);
    color: var(--text-primary);
    height: 36px;
  }
</style>
</head>
<body>
<!-- Capture loop: done screen (post-commit confirmation; skipped items stay revisitable here too, not just during the review queue). See capture-loop.md sec 2/3. Standalone: colors/icons are approximations of Claude Design System tokens, not the production palette. -->
<div style="background: var(--surface-1); border-radius: 12px; padding: 12px; max-width: 340px; margin: 0 auto;">
  <div style="background: var(--surface-2); border-radius: 28px; border: 0.5px solid var(--border); overflow: hidden;">

    <div style="padding: 32px 20px 20px; text-align: center;">

      <div style="width: 56px; height: 56px; border-radius: 50%; background: var(--bg-success); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
        <i class="ti ti-check" style="font-size: 26px; color: var(--text-success);" aria-hidden="true"></i>
      </div>

      <h2 style="margin: 0 0 6px;">Added to your Bunko</h2>
      <p style="font-size: 13px; color: var(--text-secondary); margin: 0 0 24px; line-height: 1.5;">9 new words, 1 merged, 3 new templates</p>

      <div style="text-align: left; border-top: 0.5px solid var(--border); padding-top: 16px; margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 10px; background: var(--surface-1); border-radius: var(--radius); padding: 10px 12px;">
          <i class="ti ti-alert-circle" style="font-size: 16px; color: var(--text-muted); flex-shrink: 0;" aria-hidden="true"></i>
          <div style="flex: 1;">
            <p style="font-size: 13px; margin: 0;">1 item left skipped</p>
            <p style="font-size: 12px; color: var(--text-muted); margin: 2px 0 0;">走る — picture-derived, low confidence</p>
          </div>
          <button style="font-size: 12px; padding: 4px 10px; flex-shrink: 0;">Review</button>
        </div>
      </div>

      <button style="width: 100%; background: var(--fill-primary); color: var(--on-primary); border: none; margin-bottom: 8px;">
        Done
      </button>
      <button style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;">
        <i class="ti ti-camera" style="font-size: 16px;" aria-hidden="true"></i>
        Import another worksheet
      </button>

    </div>
  </div>
</div>
</body></html>
